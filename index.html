<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday, My Special Friend! 🎉</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Poppins:wght@300;400;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
            min-height: 100vh;
            position: relative;
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .star {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 2s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .birthday-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 60px 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            animation: slideUp 1s ease-out;
            max-width: 700px;
            position: relative;
            overflow: hidden;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .birthday-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
            transform: rotate(45deg);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        .cake {
            font-size: 80px;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-20px); }
            60% { transform: translateY(-10px); }
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 4rem;
            font-weight: 700;
            color: #e91e63;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 2px 2px 4px rgba(0,0,0,0.1), 0 0 20px #ff69b4; }
            to { text-shadow: 2px 2px 4px rgba(0,0,0,0.1), 0 0 30px #ff1493; }
        }

        .subtitle {
            font-size: 1.5rem;
            color: #666;
            margin-bottom: 30px;
            font-weight: 300;
        }

        .message {
            font-size: 1.3rem;
            line-height: 1.8;
            color: #333;
            margin-bottom: 40px;
            font-weight: 400;
        }

        .highlight {
            background: linear-gradient(120deg, #ff9a9e, #fecfef);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 3s ease infinite;
            font-weight: 600;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(45deg, #ff6b9d, #e91e63);
            color: white;
            box-shadow: 0 10px 30px rgba(233, 30, 99, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(233, 30, 99, 0.6);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.8);
            color: #e91e63;
            border: 2px solid #ff9a9e;
        }

        .btn-secondary:hover {
            background: #ff9a9e;
            color: white;
            transform: translateY(-3px);
        }

        /* Slideshow Gallery */
        .slideshow-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            flex-direction: column;
        }

        .slideshow-overlay.active {
            display: flex;
        }

        .slideshow-container {
            max-width: 90%;
            max-height: 90%;
            position: relative;
            text-align: center;
        }

        .slideshow-image {
            max-width: 100%;
            max-height: 70vh;
            border-radius: 20px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.5);
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.6s ease;
        }

        .slideshow-image.active {
            opacity: 1;
            transform: scale(1);
        }

        .slideshow-controls {
            display: flex;
            gap: 20px;
            margin-top: 30px;
            justify-content: center;
            align-items: center;
        }

        .nav-btn {
            background: rgba(255,255,255,0.9);
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e91e63;
            font-weight: bold;
        }

        .nav-btn:hover {
            background: #ff6b9d;
            color: white;
            transform: scale(1.1);
            box-shadow: 0 10px 25px rgba(255,107,157,0.4);
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }

        .counter {
            color: white;
            font-size: 1.4rem;
            font-weight: 600;
            min-width: 100px;
        }

        .close-slideshow {
            position: absolute;
            top: 30px;
            right: 30px;
            background: rgba(255,255,255,0.9);
            border: none;
            border-radius: 50%;
            width: 55px;
            height: 55px;
            font-size: 22px;
            cursor: pointer;
            color: #e91e63;
            transition: all 0.3s ease;
        }

        .close-slideshow:hover {
            background: #ff6b9d;
            color: white;
            transform: scale(1.1);
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.8rem; }
            .cake { font-size: 60px; }
            .birthday-card { padding: 40px 20px; margin: 20px; }
            .slideshow-image { max-height: 60vh; }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>

    <div class="container">
        <div class="birthday-card">
            <div class="cake">🎂✨🎉</div>
            <h1>Happy Birthday!</h1>
            <p class="subtitle">To my most <span class="highlight">special friend</span> 🎈</p>
            
            <div class="message">
                Today is all about celebrating YOU! 🌟<br><br>
                You've brought so much joy, laughter, and light into my life.<br>
                Here's to another year of amazing adventures together!<br><br>
                <span class="highlight">Click CELEBRATE to see special birthday pictures! 💖</span>
            </div>

            <div class="buttons">
                <button class="btn btn-primary" onclick="showSlideshow()">
                    🎆 Show Pictures! 🎆
                </button>
                <a href="#" class="btn btn-secondary" onclick="shareWish(event)">
                    💌 Share this wish
                </a>
            </div>
        </div>
    </div>

    <!-- Slideshow Overlay -->
    <div class="slideshow-overlay" id="slideshowOverlay">
        <button class="close-slideshow" onclick="closeSlideshow()">✕</button>
        <div class="slideshow-container">
            <img class="slideshow-image" id="slideshowImage" src="" alt="Birthday Picture">
            <div class="slideshow-controls">
                <button class="nav-btn" id="prevBtn" onclick="changeSlide(-1)">‹</button>
                <div class="counter" id="counter">1 / 12</div>
                <button class="nav-btn" id="nextBtn" onclick="changeSlide(1)">›</button>
            </div>
        </div>
    </div>

    <script>
        // Beautiful birthday pictures
        const birthdayPictures = [
            'https://images.unsplash.com/photo-1511894350930-b87d4c8e7917?w=800&h=600&fit=crop',
            'https://images.unsplash.com/photo-1511632765486-a01980e01a18?w=800&h=600&fit=crop',
            'https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=800&h=600&fit=crop',
            'https://images.unsplash.com/photo-1519452635265-7b1fbfd1e891?w=800&h=600&fit=crop',
            'https://images.unsplash.com/photo-1606890658317-7d14490b76fd?w=800&h=600&fit=crop',
            'https://images.unsplash.com/photo-1544551763-46a013bb70d5?w=800&h=600&fit=crop',
            'https://images.unsplash.com/photo-1516589178581-6cd7838b8c47?w=800&h=600&fit=crop',
            'https://images.unsplash.com/photo-1603354623048-7a35dd81c6f8?w=800&h=600&fit=crop',
            'https://images.unsplash.com/photo-1519046904884-53103b34b206?w=800&h=600&fit=crop',
            'https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=800&h=600&fit=crop',
            'https://images.unsplash.com/photo-1564401243081-d099305ee912?w=800&h=600&fit=crop',
            'https://images.unsplash.com/photo-1511285560929-80b456fea0bc?w=800&h=600&fit=crop'
        ];

        let currentSlide = 0;

        // Create stars
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 2 + 's';
                starsContainer.appendChild(star);
            }
        }

        // Show slideshow
        function showSlideshow() {
            currentSlide = 0;
            showSlide(currentSlide);
            document.getElementById('slideshowOverlay').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        // Close slideshow
        function closeSlideshow() {
            document.getElementById('slideshowOverlay').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        // Show specific slide
        function showSlide(n) {
            const image = document.getElementById('slideshowImage');
            const total = birthdayPictures.length;
            
            // Update slide index
            currentSlide = (n + total) % total;
            
            // Update image
            image.src = birthdayPictures[currentSlide];
            image.classList.remove('active');
            
            // Add active class after load
            image.onload = () => {
                image.classList.add('active');
            };
            
            // Update counter
            document.getElementById('counter').textContent = `${currentSlide + 1} / ${total}`;
            
            // Update buttons
            updateButtons();
        }

        // Change slide
        function changeSlide(direction) {
            showSlide(currentSlide + direction);
        }

        // Update navigation buttons
        function updateButtons() {
            // Always enabled for circular navigation
        }

        // Auto slideshow (optional)
        let autoSlideInterval;
        function startAutoSlide() {
            autoSlideInterval = setInterval(() => {
                changeSlide(1);
            }, 4000);
        }

        function stopAutoSlide() {
            clearInterval(autoSlideInterval);
        }

        // Share function
        function shareWish(event) {
            event.preventDefault();
            if (navigator.share) {
                navigator.share({
                    title: 'Happy Birthday!',
                    text: 'Wishing my special friend the happiest birthday! 🎉🎂',
                    url: window.location.href
                });
            } else {
                navigator.clipboard.writeText(window.location.href);
                alert('🎉 Birthday link copied to clipboard!');
            }
        }

        // Event listeners
        document.getElementById('slideshowOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeSlideshow();
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeSlideshow();
            else if (e.key === 'ArrowLeft') changeSlide(-1);
            else if (e.key === 'ArrowRight') changeSlide(1);
        });

        // Pause auto-slide on hover
        const slideshowOverlay = document.getElementById('slideshowOverlay');
        slideshowOverlay.addEventListener('mouseenter', stopAutoSlide);
        slideshowOverlay.addEventListener('mouseleave', startAutoSlide);

        // Initialize
        createStars();
        showSlideshow(); // Preload first image

        // Floating hearts
        setTimeout(() => {
            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.innerHTML = '💖';
                    heart.style.cssText = `
                        position: fixed;
                        left: ${Math.random() * 100}vw;
                        top: 100vh;
                        font-size: 20px;
                        pointer-events: none;
                        z-index: 50;
                        animation: floatUp 4s ease-out forwards;
                    `;
                    document.body.appendChild(heart);
                    setTimeout(() => heart.remove(), 4000);
                }, i * 200);
            }
        }, 1000);

        // Add floating animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes floatUp {
                to { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
